<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Die neue Website des Jugendhauses Bad Imnau ist bald für euch da.">
  <meta name="robots" content="noindex,nofollow">
  <title>Jugendhaus Bad Imnau – Coming Soon</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f3efe7;
      --text: #161616;
      --accent: #d8282f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(28px, 5vw, 64px);
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: min(270px, 62vw);
      height: auto;
      margin-bottom: clamp(44px, 8vh, 80px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 6.5rem);
      font-weight: 800;
      letter-spacing: -0.055em;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .loader {
      position: relative;
      width: min(410px, 76vw);
      height: 20px;
      margin-top: 40px;
      overflow: hidden;
      border: 2px solid #1b1b1b;
      border-radius: 999px;
      background: rgba(22, 22, 22, 0.1);
      box-shadow: inset 0 1px 3px rgba(22, 22, 22, 0.16);
    }

    .loader::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      background: linear-gradient(90deg, #111 0%, #3c3c3c 72%, #111 100%);
      box-shadow: 2px 0 8px rgba(22, 22, 22, 0.28);
      animation: load 30s linear infinite;
    }

    @keyframes load {
      0% { width: 0; }
      70% { width: 72%; }
      100% { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader::before {
        width: 72%;
        animation: none;
      }
    }

    footer {
      display: flex;
      justify-content: center;
      gap: 26px;
      padding-top: 36px;
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <div class="content">
      <img class="logo" src="images/logo/logo-white.webp" alt="Jugendhaus Bad Imnau">
      <h1>Coming Soon</h1>
      <div class="loader" role="status" aria-label="Die Website wird vorbereitet"></div>
    </div>
  </main>

  <footer>
    <a href="index.html">Impressum</a>
    <a href="index.html">Datenschutz</a>
  </footer>
</body>
</html>
