<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Die neue Website des Jugendhauses Bad Imnau ist bald für euch da.">
  <title>Jugendhaus Bad Imnau – Coming Soon</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f3efe7;
      --text: #161616;
      --accent: #d8282f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(28px, 5vw, 64px);
      background: var(--background);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: min(270px, 62vw);
      height: auto;
      margin-bottom: clamp(44px, 8vh, 80px);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 6.5rem);
      font-weight: 800;
      letter-spacing: -0.055em;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .loader {
      width: 46px;
      height: 46px;
      margin-top: 40px;
      border: 4px solid rgba(216, 40, 47, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .loader { animation-duration: 2.5s; }
    }

    footer {
      display: flex;
      justify-content: center;
      gap: 26px;
      padding-top: 36px;
      font-size: 0.84rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover,
    footer a:focus-visible {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <div class="content">
      <img class="logo" src="images/logo-white.png" alt="Jugendhaus Bad Imnau">
      <h1>Coming Soon</h1>
      <div class="loader" role="status" aria-label="Die Website wird vorbereitet"></div>
    </div>
  </main>

  <footer>
    <a href="index.html">Impressum</a>
    <a href="index.html">Datenschutz</a>
  </footer>
</body>
</html>
